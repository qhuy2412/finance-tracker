server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://${MONITOR_IP}:3100/loki/api/v1/push

scrape_configs:
  # 1. Scrape Docker container logs
  - job_name: docker-container-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(fintra_backend_prod|fintra_frontend_prod)
        target_label: container_name
      - source_labels: [__meta_docker_container_name]
        regex: /(fintra_backend_prod|fintra_frontend_prod)
        target_label: job
      - replacement: ${HOSTNAME}
        target_label: host
