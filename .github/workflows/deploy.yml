name: FinTra CI/CD Pipeline

on:
  push:
    branches: [ main ] # Tự động chạy khi bạn push code vào nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          # Giả sử folder frontend của bạn tên là 'frontend'
          cd frontend
          npm install
          npm run build

      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/root/fintra/finance-tracker 
            
            git pull origin main
            
            cd backend
            npm install
            pm2 restart fintra-api --update-env
            
            sudo rm -rf /var/www/fintra/finance-tracker/frontend/dist/*
            sudo cp -r ../frontend/dist/* /var/www/fintra/finance-tracker/frontend/dist/
            
            sudo systemctl reload nginx