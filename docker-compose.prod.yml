services:
  # 1. Backend Service (Express Node.js API)
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}-backend:latest
    container_name: fintra_backend_prod
    restart: always
    ports:
      - "9999:9999"
    volumes:
      - /var/www/fintra/logs:/app/logs
    # Load all environment variables securely from the host VM's local env file
    env_file:
      - /var/www/fintra/.env
    environment:
      - PORT=9999
      - NODE_ENV=production
      # Point to host-gateway to connect to ProxySQL running on VM host OS (port 6033)
      - DB_HOST=host.docker.internal
      - DB_PORT=6033
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Frontend Service (React + Nginx static server)
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:latest
    container_name: fintra_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Promtail Log Collector (runs on all hosts)
  promtail:
    image: grafana/promtail:3.0.0
    container_name: fintra_promtail_prod
    user: "0:0"
    volumes:
      - /var/www/fintra/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/www/fintra/logs:/var/log/fintra:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      - MONITOR_IP=${MONITOR_IP}
      - HOSTNAME=${HOSTNAME}
    restart: always
